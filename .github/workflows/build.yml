name: Build APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: 17
  JAVA_DIST: temurin
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseParallelGC"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DIST }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false

      - name: Install Android SDK packages
        run: |
          set -e
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools"
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list_installed

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
            app/build
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Validate Gradle wrapper
        run: ./gradlew --version

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon || true
        continue-on-error: true

      - name: Sign release APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: r0adkll/sign-android-release@v1
        id: sign_release
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: 35.0.0

      - name: Rename APKs with git short hash
        id: rename
        run: |
          SHORT_HASH=$(git rev-parse --short HEAD)
          VERSION_NAME="0.1.0-${SHORT_HASH}"
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk artifacts/shadps4-android-debug-${VERSION_NAME}.apk
          if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk artifacts/shadps4-android-release-unsigned-${VERSION_NAME}.apk
          fi
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk artifacts/shadps4-android-release-${VERSION_NAME}.apk
          fi
          ls -la artifacts/
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shadps4-android-debug
          path: artifacts/shadps4-android-debug-*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shadps4-android-release
          path: artifacts/shadps4-android-release-*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/shadps4-android-release-*.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          body: |
            ## shadPS4 Android - ${{ steps.rename.outputs.version_name }}

            **⚠️ UI prototype only. No PS4 game execution yet.**

            ### Downloads
            - `shadps4-android-release-*.apk` — signed release build
            - See artifacts for the debug build

            ### How to install
            1. Enable "Install unknown apps" for your browser
            2. Tap the APK on your phone (Android 8.0+)
            3. Open "shadPS4" from your launcher

            ### Minimum requirements
            - Android 8.0 (API 26)
            - Vulkan 1.1 capable GPU
            - ARM64 device recommended
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
      - run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0"
      - run: chmod +x ./gradlew
      - run: ./gradlew lintDebug --no-daemon || true
        continue-on-error: true
